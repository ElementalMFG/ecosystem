# pytest-embedded config for the on-target Unity test app (S-02-015).
[pytest]
# pytest-embedded discovers test modules by this prefix (not the default
# test_*.py), so the runner file reads as pytest_ss_target.py.
python_files = pytest_*.py
markers =
    esp32s3: on-target case for the ESP32-S3 (Lite) silicon
