#
# Firmware build check (S-02-001): builds every board port inside the
# digest-pinned reproducible container. Required status check on `main`
# (VA-02 in docs/portfolio/09_VENTURE_EXECUTION_MAP.md).

name: firmware-build

# `build (lite)` is a REQUIRED status check on `main` (D-0014). Required
# checks must always report, so the workflow triggers on every PR and a
# `changes` job decides whether the heavy container build (`firmware`)
# runs. GitHub does NOT expand the matrix of a job skipped by its
# job-level `if:` (it reports a single check under the bare job name),
# so the heavy job cannot carry the required context itself. Instead the
# always-running `build` gate job reports `build (lite)` on every PR:
# it passes when the firmware build succeeded, or when it was skipped
# because no firmware-relevant paths changed, and fails otherwise.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      firmware: ${{ steps.diff.outputs.firmware }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Detect firmware-relevant changes
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "firmware=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "${{ github.event.pull_request.base.sha }}"...HEAD \
              | grep -E '^(firmware/|ci/containers/firmware/|\.github/workflows/firmware-build\.yml)'; then
            echo "firmware=true" >> "$GITHUB_OUTPUT"
          else
            echo "No firmware-relevant paths changed; build will be skipped."
            echo "firmware=false" >> "$GITHUB_OUTPUT"
          fi

  firmware:
    needs: changes
    if: needs.changes.outputs.firmware == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board: [lite]          # alpha, omega join the matrix when their HAL epics start
    container:
      # Same digest as ci/containers/firmware/Dockerfile (espressif/idf:v5.3.5).
      image: espressif/idf@sha256:114a9f8cde8bdc5a7e95809745b492663f7c5afe9c2821a4127ff133754fafd2
    steps:
      - uses: actions/checkout@v7

      - name: Deterministic build metadata
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct || date +%s)" >> "$GITHUB_ENV"

      - name: Build (${{ matrix.board }})
        working-directory: firmware
        run: |
          . "$IDF_PATH/export.sh"
          idf.py -B "build/${{ matrix.board }}" -DSS_BOARD="${{ matrix.board }}" build

      - name: Size report
        working-directory: firmware
        run: |
          . "$IDF_PATH/export.sh"
          idf.py -B "build/${{ matrix.board }}" size

  # Required-context reporter. Always runs, so `build (lite)` reports on
  # every PR. NOTE: `needs.firmware.result` is the aggregate over the
  # firmware matrix — with multiple boards, any board failure fails every
  # `build (<board>)` gate, which is the desired required-check behavior.
  build:
    needs: [changes, firmware]
    if: always()
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board: [lite]          # keep in sync with the firmware matrix
    steps:
      - name: Gate on firmware build result
        run: |
          result="${{ needs.firmware.result }}"
          changed="${{ needs.changes.outputs.firmware }}"
          echo "firmware job result: $result (firmware paths changed: $changed)"
          if [ "$result" = "success" ]; then
            exit 0
          fi
          if [ "$result" = "skipped" ] && [ "$changed" = "false" ]; then
            echo "No firmware-relevant changes; build not required."
            exit 0
          fi
          echo "Firmware build failed, was cancelled, or was skipped unexpectedly."
          exit 1
