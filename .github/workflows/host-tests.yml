#
# Host-side unit tests for the ss_log redaction core (S-02-007). The formatter
# core is ESP-IDF-free, so it builds and runs on a plain gcc under ASan/UBSan —
# no firmware container required. This gate proves that %k never leaks key
# material and that the colorized-console codes exist in the sink layer.

name: host-tests

on:
  pull_request:
    paths:
      - firmware/components/ss_log/**
      - firmware/test/host/**
      - tools/boot-budget-check.py
      - tools/fixtures/boot-budget/**
      - tools/gen-sbom.py
      - tools/tests/**
      - firmware/components/ss_audio/**
      - firmware/components/ss_lora/**
      - .github/workflows/host-tests.yml
  push:
    branches: [main]
    paths:
      - firmware/components/ss_log/**
      - firmware/test/host/**
      - tools/boot-budget-check.py
      - tools/fixtures/boot-budget/**
      - tools/gen-sbom.py
      - tools/tests/**
      - firmware/components/ss_audio/**
      - firmware/components/ss_lora/**
      - .github/workflows/host-tests.yml

permissions:
  contents: read

jobs:
  ss-log-redaction:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: ss_log formatter host tests (ASan/UBSan)
        run: make -C firmware/components/ss_log/test/host test
      - name: Colorized-console codes present
        run: |
          grep -q '\\033\[0;31m' firmware/components/ss_log/src/ss_log.c
          grep -q '\\033\[0;33m' firmware/components/ss_log/src/ss_log.c
          grep -q '\\033\[0;32m' firmware/components/ss_log/src/ss_log.c

  gtest-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install gcovr
        run: pip install gcovr
      - name: Configure (googletest FetchContent, coverage on)
        run: cmake -S firmware/test/host -B build -DSS_COVERAGE=ON
      - name: Build
        run: cmake --build build -j
      - name: Run tests
        run: ctest --test-dir build --output-on-failure
      - name: Coverage report (summary table + coverage.xml)
        run: |
          gcovr --root . build \
            --filter 'firmware/components/.*' \
            --txt \
            --print-summary \
            --xml coverage.xml
      - name: Upload coverage.xml
        uses: actions/upload-artifact@v4
        with:
          name: host-coverage
          path: coverage.xml

  sbom-generator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install pytest
        run: pip install pytest
      - name: gen-sbom.py host tests (contract §10)
        run: python3 -m pytest tools/tests/test_gen_sbom.py -q

  boot-budget-selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: pass.log is under budget (exit 0)
        run: python3 tools/boot-budget-check.py tools/fixtures/boot-budget/pass.log
      - name: fail.log is over budget (exit 1)
        run: |
          rc=0; python3 tools/boot-budget-check.py tools/fixtures/boot-budget/fail.log || rc=$?
          test "$rc" -eq 1
      - name: empty input has no boot-report (exit 2)
        # `|| rc=$?` keeps the failing command in a conditional context so the
        # runner's `bash -e` doesn't abort the step before the assertion.
        run: |
          rc=0; python3 tools/boot-budget-check.py /dev/null || rc=$?
          test "$rc" -eq 2

  audio-mux-harnesses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: ss_audio host cores (mic + speaker)
        run: make -C firmware/components/ss_audio/test/host test
      - name: ss_lora LBT + duty core
        run: make -C firmware/components/ss_lora/test/host test

