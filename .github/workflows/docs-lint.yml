# SPDX-License-Identifier: Apache-2.0
# Docs lint gate (S-01-001): links, anchors, SPDX headers, constitution TOCs.
name: docs-lint

on:
  push:
    branches: [main]
    paths: ['**.md', 'tools/lint-docs.py', '.github/workflows/docs-lint.yml']
  pull_request:
    paths: ['**.md', 'tools/lint-docs.py', '.github/workflows/docs-lint.yml']

permissions:
  contents: read

jobs:
  lint-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint documentation
        run: python3 tools/lint-docs.py
