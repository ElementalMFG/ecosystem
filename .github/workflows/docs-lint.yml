# SPDX-License-Identifier: Apache-2.0
# Docs lint gate (S-01-001): links, anchors, SPDX headers, constitution TOCs.
# Also re-runs the stories-index generator in --check mode (decision D-0008).
name: docs-lint

on:
  push:
    branches: [main]
    paths: ['**.md', 'tools/lint-docs.py', 'tools/gen-stories-index.py', '.github/workflows/docs-lint.yml']
  pull_request:
    paths: ['**.md', 'tools/lint-docs.py', 'tools/gen-stories-index.py', '.github/workflows/docs-lint.yml']

permissions:
  contents: read

jobs:
  lint-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Lint documentation
        run: python3 tools/lint-docs.py
      - name: Verify stories index (D-0008)
        run: python3 tools/gen-stories-index.py --check
