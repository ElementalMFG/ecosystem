#
# CLA gate (S-01-008, owner decision A5 / D-0016): every PR author signs the
# Apache-style CLA in docs/CLA.md once; signatures are recorded on the
# `cla-signatures` branch. DCO (per-commit provenance) remains a separate
# required check — see .github/workflows/dco.yml.

name: cla

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    # Run on PR events and on "I have read the CLA..." / recheck comments.
    if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/ElementalMFG/ecosystem/blob/main/docs/CLA.md"
          branch: "cla-signatures"
          allowlist: dependabot[bot],github-actions[bot]
